name: Laravel CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  laravel-tests:
    runs-on: ubuntu-latest

    # Définition des services requis (Base de données MySQL pour les tests)
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: yes
          MYSQL_DATABASE: laravel_db_test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: 1. Récupération du code source
        uses: actions/checkout@v4

      - name: 2. Configuration de PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, xml, ctype, iconv, pdo, pdo_mysql, bcmath, dom, filter, json, openssl
          coverage: xdebug

      - name: 3. Copie du fichier d'environnement de test
        run: cp .env.example .env

      - name: 4. Installation des dépendances Composer
        run: composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      - name: 5. Génération de la clé d'application Laravel
        run: php artisan key:generate

      - name: 6. Exécution des migrations et des tests avec couverture
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: laravel_db_test
          DB_USERNAME: root
          DB_PASSWORD: ""
        run: php artisan test --coverage-clover=coverage.xml

      - name: 7. Téléchargement de l'artefact de couverture
        uses: actions/upload-artifact@v4
        with:
          name: rapport-couverture-code
          path: coverage.xml