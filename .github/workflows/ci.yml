name: Laravel CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  laravel-tests:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: yes
          MYSQL_DATABASE: laravel_db_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: 1. Récupération du code source
        uses: actions/checkout@v4

      - name: 2. Configuration de PHP & Mise en cache
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, xml, ctype, iconv, pdo, pdo_mysql, bcmath, dom, filter, json, openssl
          coverage: xdebug
          update: true
          tools: composer:v2

      # Étape de cache spécifique pour les dépendances téléchargées par Composer
      - name: 2b. Gestion du cache des paquets Composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: 3. Copie du fichier d'environnement de test
        run: cp .env.example .env

      - name: 4. Installation des dépendances Composer
        run: composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      - name: 5. Génération de la clé d'application Laravel
        run: php artisan key:generate

      - name: 6. Exécution des tests avec environnement MySQL explicite
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: laravel_db_test
          DB_USERNAME: root
          DB_PASSWORD: ""
        run: |
          mysql -h 127.0.0.1 -u root -e "CREATE DATABASE IF NOT EXISTS laravel_db_test;"
          php artisan migrate --force
          php artisan test --coverage-clover=coverage.xml

      - name: 7. Téléchargement de l'artefact de couverture
        uses: actions/upload-artifact@v4
        with:
          name: rapport-couverture-code
          path: coverage.xml